<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div#login {
            text-align: center;
            padding-top: 1px;
            width: 200px;
            height: 164px;
            background-color: black;
            border-radius: 15px;
            color: white;
        }

        input#botao {
            padding: 5px;
            border: none;
            border-radius: 6px;
            background-color: rgb(255, 255, 255);
        }

        input#botao:hover {
            background-color: aquamarine;
            transition: 1.1s;
        }

    </style>
</head>
<body>
    <h1>Primeiro Formulario</h1>
    <form action="cadastro.php" method="post" autocomplete="off">
        <p><label for="inome">Nome:</label>
            <input type="text" name="nome" id="inome"> </p>
        <p><label for="isobrenome">Sobrenome:</label>
            <input type="text" name="sobrenome" id="isobrenome"></p>
        <p><input type="submit" value="Enviar"></p>
    </form>


    <h2>Login</h2>
    <div id="login">
        <form action="login.php" method="post" autocomplete="off">
            <p>
                <label for="iusuario">Usuário</label>
                <input type="text" name="usuario" id="iusuario">
            </p>
            <p>
                <label for="isenha">Senha</label>
                <input type="password" name="senha" id="isenha">
            </p>
            <p>
                <input id="botao" type="submit" value="Enviar">
            </p>
        </form>
    </div>
</body>
</html>
