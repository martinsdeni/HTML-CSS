<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios de Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 500px;
            border-collapse: collapse;
        }
        caption {
            font-size: 1.1em;
            font-weight: bold;
            padding: 8px;
        }
        th, td {
            padding: 8px;
            border: 1px solid black;
        }
        col.cnome {
            background-color: aqua;
        }
        col.csexo {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1>Exercicio de Tabela</h1>

    <table>
        <colgroup> 
            <col class="cnome">
            <col class="csexo">
            <col class="cidade">
            <col class="cprof">
        </colgroup>

        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>Feminino</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>João Alves</td>
            <td>Masculino</td>
            <td>27</td>
            <td>Professor</td>
        </tr>
        <tr class="destaque">
            <td>Lucia</td>
            <td>Feminino</td>
            <td>45</td>
            <td>Bibliotecaria</td>
        </tr>
        <tr>
            <td>Maria Clara</td>
            <td>Feminino</td>
            <td>22</td>
            <td>Dentista</td>
        </tr>
        <tr>
            <td>Mateus</td>
            <td>Masculino</td>
            <td>18</td>
            <td>Assistente</td>
        </tr>
        <tr>
            <td>Jackson</td>
            <td>Masculino</td>
            <td>24</td>
            <td>Engenheiro</td>
        </tr>
    </table>
</body>
</html>
