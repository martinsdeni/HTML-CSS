<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este video esta hospedado no meu proprio servidor.</p>
    
    <video src="midia/meuvideo.mp4" width="600" controls loop>
        <p>Seu navegador não é compativel com esse tipo de mídia</p>
    </video>
    
    <h1>Inserindo videos do Youtube</h1>
    <p>Video com hospedagem externa direto do Youtube</p>
        <iframe width="600" height="315" src="https://www.youtube.com/embed/_f0XcVwNa8A" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>

    <h1>Inserindo videos do Vimeo</h1>
    <p>Video de hospedagem externa direto do Vimeo</p>
        <iframe src="https://player.vimeo.com/video/7466309?h=eca17c0f9a" width="600" height="480" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
</body>
</html>
